# OTel Collector 설정 (ConfigMap으로 배포). 4계층 로그를 한 곳에서 "중앙 수집"해서
# 단일 OTLP(gRPC) 익스포터로 Central SIEM(Otel Gateway)에 보내는 게 이 Collector의 역할이다.
#
#   ① 관문(WAS)     : Juice Shop 앞단 nginx-was-logger 사이드카가 stdout에 남기는 JSON
#                      access log를 filelog로 tail (juice-shop-nginx-configmap.yaml 참고)
#   ① 관문(WAF)     : FastAPI WAF 백엔드(backend/)가 OTel SDK로 직접 OTLP push하는 로그
#                      (log.source=waf, 탐지·로그 전용 — 차단은 WAS 책임)
#   ② 내부 런타임(Falco): Falco 파드의 stdout(json_output) 로그 파일을 filelog로 tail
#   ③ 제어판(K8s Audit) : kube-apiserver가 남긴 audit.log 파일을 filelog로 tail
#
# 4계층 모두 json_parser 등으로 필드를 뽑아 우리 쪽 스키마에 맞게 규격화하지 않는다.
# 각 소스가 원래 만들어내는 로그 원본을 body에 그대로 실어서(container 오퍼레이터로 CRI
# 래핑만 벗겨냄) resource["log.source"]만 태깅한 뒤 OTLP(gRPC) exporter로 그대로
# 전달한다 - 파싱/정규화는 로그를 받는 분석 서버 쪽 책임으로 남겨둔다.
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
data:
  config.yaml: |
    receivers:
      # ① 관문(WAS) - Juice Shop 옆 nginx-was-logger 사이드카의 stdout access log를 tail.
      # 필드를 파싱해서 스키마를 강제하지 않고, nginx가 남긴 JSON 한 줄을 body에 원본
      # 그대로 실어서 보낸다 (규격화는 분석 서버 쪽 책임).
      filelog/was:
        include:
          - /var/log/pods/default_juice-shop-*/nginx-was-logger/*.log
        include_file_path: true
        start_at: end
        operators:
          # containerd/CRI 로그 포맷(타임스탬프+스트림+P/F 태그) 껍데기만 벗겨내서
          # body를 nginx가 실제로 남긴 원본 로그 라인으로 되돌린다 - 내용 파싱은 하지 않는다.
          - type: container
          - type: add
            field: resource["log.source"]
            value: "was"

      # ① 관문(WAF) - backend Pod가 OTel SDK로 직접 push하는 경로 (app/otel/logger.py 참고)
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      # ② 내부 런타임(Falco) - 컨테이너 stdout 로그 파일(CRI 포맷)을 tail
      filelog/falco:
        include:
          - /var/log/pods/falco_falco-*/falco/*.log
        include_file_path: true
        start_at: end
        operators:
          # containerd/CRI 로그 라인 포맷(타임스탬프+스트림+P/F 태그)을 파싱하고
          # 파일 경로에서 k8s 네임스페이스/파드/컨테이너 이름까지 함께 뽑아준다.
          - type: container
          - type: add
            field: resource["log.source"]
            value: "falco"

      # ③ 제어판(K8s Audit) - kube-apiserver가 남긴 JSON 감사 로그를 tail
      # (k3d-audit-policy.yaml 정책에 따라 비정상 API 호출 / RBAC 과다 요청 / SA 탈취 시도 위주로 기록됨)
      # 여기서도 필드를 뽑아 스키마를 입히지 않고, kube-apiserver가 남긴 JSON 한 줄을
      # body에 원본 그대로 실어서 보낸다.
      filelog/k8s_audit:
        include:
          - /var/log/kubernetes/audit/audit*.log
        start_at: beginning
        operators:
          - type: add
            field: resource["log.source"]
            value: "k8s-audit"

    processors:
      batch: {}

    exporters:
      # Central SIEM 없이도 로컬에서 "실제로 나가는지" 확인하기 위한 콘솔 출력
      debug:
        verbosity: detailed
      # 실제 중앙 전송 경로 - gRPC(OTLP)로 Central SIEM(Otel Gateway)에 전송.
      # 각 노드의 otel-collector(DaemonSet)가 로컬에서 모은 로그를 gRPC로 쏘고,
      # 중앙의 Otel Gateway가 이를 받아낸다. HTTP보다 빠르고 효율적이라 gRPC를 쓴다.
      # 목적지는 배포 매니페스트의 CENTRAL_SIEM_OTLP_ENDPOINT로 채운다.
      #
      # 크로스-서버 mTLS - Traefik이 TCP 패스스루(TLS 안 까고 그대로 전달)로 물러나고
      # 중앙 otel-collector가 mTLS를 직접 종단한다(IDS-COLLECTOR의 servers/otel/ 참고,
      # 2026-07-15 Traefik의 passTLSClientCert가 h2c 백엔드에서 헤더를 안 넘기는 걸
      # 확인해서 이 구조로 옮김). 이 사이트(site-edge01) 전용 클라 인증서로 접속해야
      # 하고, otel-collector-mtls-client Secret(otel-collector-deployment.yaml 참고)에서
      # 마운트된 파일을 쓴다. 인증서는 7일 유효 - 갱신은 scripts/renew-edge-tls.sh 몫.
      otlp:
        endpoint: ${env:CENTRAL_SIEM_OTLP_ENDPOINT}
        tls:
          cert_file: /etc/otel/certs/client.crt
          key_file: /etc/otel/certs/client.key
          ca_file: /etc/otel/certs/ca.crt

    service:
      pipelines:
        logs/was:
          receivers: [filelog/was]
          processors: [batch]
          exporters: [debug, otlp]
        logs/waf:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug, otlp]
        logs/falco:
          receivers: [filelog/falco]
          processors: [batch]
          exporters: [debug, otlp]
        logs/k8s_audit:
          receivers: [filelog/k8s_audit]
          processors: [batch]
          exporters: [debug, otlp]
