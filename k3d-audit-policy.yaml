# Kubernetes(kube-apiserver) Audit 정책.
# 목적: 컨트롤 플레인 방어 - 클러스터 내부에서 발생하는
#   1) 비정상적인 API 호출
#   2) 과도한 권한(RBAC) 요청 (Role/ClusterRole/RoleBinding/ClusterRoleBinding 변경)
#   3) 서비스 어카운트(ServiceAccount) 탈취 시도 (SA/토큰 발급, Secret 조회)
# 를 감지하기 위한 근거 로그를 남긴다. Falco(런타임)·WAS 로그(nginx)와 마찬가지로
# 지금 단계에서는 파일로만 적재하고, 추후 OTel Collector가 이 파일을 tail해서 수집한다.
#
# 사용법: k3d-cluster-config.yaml이 이 파일을 서버 노드의
#   /etc/kubernetes/audit-policy.yaml 로 마운트하고,
#   kube-apiserver에 --audit-policy-file 인자로 넘긴다.
apiVersion: audit.k8s.io/v1
kind: Policy
# RequestReceived 단계는 ResponseComplete와 내용이 중복돼서 로그量만 두 배로 늘어난다.
omitStages:
  - "RequestReceived"
rules:
  # ── 노이즈 제거: 시스템 컴포넌트의 반복적인 조회성 호출은 기록하지 않음 ──
  - level: None
    userGroups:
      - "system:nodes"
    verbs: ["get", "list", "watch"]

  - level: None
    users:
      - "system:kube-scheduler"
      - "system:kube-controller-manager"
      - "system:kube-proxy"
    verbs: ["get", "list", "watch"]

  - level: None
    nonResourceURLs:
      - "/healthz*"
      - "/livez*"
      - "/readyz*"
      - "/metrics"
      - "/version"

  # ── SA 토큰 자동 발급 노이즈 제거 (2026-07-14, S25 재료): 실측 확인 결과 이
  #    클러스터의 create serviceaccounts/token은 거의 전부 kubelet(매 pod의
  #    projected volume bound-token을 몇 분 주기로 갱신, user=system:node:*)과
  #    kube-controller-manager의 내부 호출이었다 - 아래 rules.py의 아래쪽
  #    "그 외 모든 요청은 Metadata로 기록" 규칙에 걸리면 이 두 신원만으로도
  #    상관분석 노이즈가 압도적으로 커진다. 이 두 신원만 걸러내면 남는 요청은
  #    사람/외부 신원이 TokenRequest API를 명시적으로 호출한 드문 이벤트가 된다
  #    (S25: ServiceAccount 토큰 명시적 발급 정황, T1550). users/userGroups를
  #    한 규칙에 같이 쓰면 AND로 묶여 의도가 달라지므로 두 규칙으로 분리했다.
  - level: None
    userGroups:
      - "system:nodes"
    resources:
      - group: ""
        resources:
          - "serviceaccounts/token"
    verbs: ["create"]

  - level: None
    users:
      - "system:kube-controller-manager"
    resources:
      - group: ""
        resources:
          - "serviceaccounts/token"
    verbs: ["create"]

  # ── RBAC 권한 상승/과다 요청 탐지: 실제로 어떤 권한을 부여했는지 봐야 하므로
  #    요청/응답 본문까지 전부 남긴다. 아래 리소스 4개는 IDS-COLLECTOR의
  #    ids_shared.k8s_constants.RBAC_ALL_RESOURCES와 같은 뜻(normalizer/
  #    correlation-engine의 severity.yaml·rbac.yaml에도 같은 목록이 있다) - 이
  #    파일은 kube-apiserver가 직접 읽어서 Python 쪽과 자동으로 공유할 수 없으니
  #    목록을 바꾸면 IDS-COLLECTOR 쪽도 수동으로 같이 고칠 것 ──
  - level: RequestResponse
    resources:
      - group: "rbac.authorization.k8s.io"
        resources:
          - "roles"
          - "clusterroles"
          - "rolebindings"
          - "clusterrolebindings"
    verbs: ["create", "update", "patch", "delete"]

  # ── Pod 탈옥(컨테이너 이스케이프) 정황 탐지: privileged/hostNetwork/hostPID/hostIPC/
  #    hostPath 마운트 여부가 전부 pod spec(요청 본문) 안에만 있어서 Metadata
  #    레벨(verb/resource만)로는 절대 판정 불가능하다. 응답 본문은 필요 없고(생성
  #    요청 자체의 spec만 보면 됨) 이 필드들은 생성 이후 수정 불가능한 불변
  #    필드라 verb도 create만 있으면 충분해서 RequestResponse가 아니라 Request로
  #    제한해 로그量을 절반으로 줄인다 ──
  - level: Request
    resources:
      - group: ""
        resources:
          - "pods"
    verbs: ["create"]

  # ── NodePort Service 노출 탐지: spec.type이 요청 본문에만 있어서 Metadata로는
  #    판정 불가능하다. pod의 hostNetwork류(생성 후 불변)와 달리 spec.type은
  #    ClusterIP로 만든 뒤 patch/update로 NodePort로 바꿀 수 있어서 create만 보면
  #    그 경로를 놓친다 - update/patch도 포함 ──
  - level: Request
    resources:
      - group: ""
        resources:
          - "services"
    verbs: ["create", "update", "patch"]

  # ── ConfigMap에 시크릿처럼 평문 자격증명을 넣는 실수 탐지: Secret과 달리 ConfigMap은
  #    암호화/난독화 없이 저장되므로 data/binaryData 내용을 봐야 한다. 생성뿐 아니라
  #    수정으로도 자격증명이 들어갈 수 있어 update/patch도 포함 ──
  - level: Request
    resources:
      - group: ""
        resources:
          - "configmaps"
    verbs: ["create", "update", "patch"]

  # ── TLS 없는 Ingress 노출 탐지 (2026-07-14, S24 재료): spec.tls 존재 여부가
  #    요청 본문에만 있어서 Metadata로는 판정 불가능하다. falcosecurity/plugins의
  #    "Ingress Object without TLS Certificate Created" 룰이 kcreate(생성 시점)만
  #    보므로 이 프로젝트도 create만 잡는다(응답 본문은 필요 없어 Request로 제한) ──
  - level: Request
    resources:
      - group: "networking.k8s.io"
        resources:
          - "ingresses"
    verbs: ["create"]

  # ── ServiceAccount 탈취 시도 탐지: 누가/언제/어떤 SA에 접근했는지가 핵심이라
  #    Metadata 레벨로 남긴다 (Secret/토큰 원문을 로그 파일에 그대로 남기지 않기 위함) ──
  - level: Metadata
    resources:
      - group: ""
        resources:
          - "serviceaccounts"
          - "serviceaccounts/token"
          - "secrets"

  # ── 그 외 클러스터 상태를 바꾸는 모든 요청은 최소 Metadata 레벨로 기록 ──
  - level: Metadata
    verbs: ["create", "update", "patch", "delete", "deletecollection"]

  # ── 나머지 API 호출(조회 포함)도 비정상 호출 패턴 탐지를 위해 기본적으로 수집 ──
  - level: Metadata
