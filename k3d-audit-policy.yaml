# Kubernetes(kube-apiserver) Audit 정책.
# 목적: 컨트롤 플레인 방어 - 클러스터 내부에서 발생하는
#   1) 비정상적인 API 호출
#   2) 과도한 권한(RBAC) 요청 (Role/ClusterRole/RoleBinding/ClusterRoleBinding 변경)
#   3) 서비스 어카운트(ServiceAccount) 탈취 시도 (SA/토큰 발급, Secret 조회)
# 를 감지하기 위한 근거 로그를 남긴다. Falco(런타임)·WAS 로그(nginx)와 마찬가지로
# 지금 단계에서는 파일로만 적재하고, 추후 OTel Collector가 이 파일을 tail해서 수집한다.
#
# 사용법: k3d-cluster-config.yaml이 이 파일을 서버 노드의
#   /etc/kubernetes/audit-policy.yaml 로 마운트하고,
#   kube-apiserver에 --audit-policy-file 인자로 넘긴다.
apiVersion: audit.k8s.io/v1
kind: Policy
# RequestReceived 단계는 ResponseComplete와 내용이 중복돼서 로그量만 두 배로 늘어난다.
omitStages:
  - "RequestReceived"
rules:
  # ── 노이즈 제거: 시스템 컴포넌트의 반복적인 조회성 호출은 기록하지 않음 ──
  - level: None
    userGroups:
      - "system:nodes"
    verbs: ["get", "list", "watch"]

  - level: None
    users:
      - "system:kube-scheduler"
      - "system:kube-controller-manager"
      - "system:kube-proxy"
      # k3s/k3d 전용 합성 신원 (2026-07-15 실측 추가): 이 3개는 표준 k8s
      # 문서의 예시 정책엔 없어서 처음부터 빠져 있었다 - system:apiserver는
      # API 서버의 애그리게이션/디스커버리용 내부 호출 신원, k3s-controller·
      # k3s-supervisor는 k3s가 kube-controller-manager/scheduler를 단일
      # 바이너리로 합치면서 쓰는 내부 신원, k3s-cloud-controller-manager는
      # k3d가 내장으로 띄우는 cloud-controller-manager다.
      - "system:apiserver"
      - "system:k3s-controller"
      - "system:k3s-supervisor"
      - "k3s-cloud-controller-manager"
    verbs: ["get", "list", "watch"]

  # kube-system 내장 컨트롤러(신뢰됨)의 조회성 호출 노이즈 제거 (2026-07-15
  # 실측 추가): 5000건 샘플에서 실제로 이 트래픽을 낸 신원은 아래 12개뿐이었다.
  # "system:serviceaccounts:kube-system" 그룹 전체를 걸지 않고 개별 신원만
  # 나열하는 이유 - 그 그룹으로 걸면 공격자가 kube-system에 새 SA/파드를 심었을
  # 때 그 SA의 조회(정찰) 트래픽까지 자동으로 묻힌다. 새로 생기는 kube-system
  # SA는 목록에 없어 계속 기록되므로 이상 탐지 관점에서 더 안전하다.
  - level: None
    users:
      - "system:serviceaccount:kube-system:traefik"
      - "system:serviceaccount:kube-system:metrics-server"
      - "system:serviceaccount:kube-system:generic-garbage-collector"
      - "system:serviceaccount:kube-system:resourcequota-controller"
      - "system:serviceaccount:kube-system:coredns"
      - "system:serviceaccount:kube-system:endpointslice-controller"
      - "system:serviceaccount:kube-system:endpoint-controller"
      - "system:serviceaccount:kube-system:node-controller"
      - "system:serviceaccount:kube-system:daemon-set-controller"
      - "system:serviceaccount:kube-system:replicaset-controller"
      - "system:serviceaccount:kube-system:deployment-controller"
      - "system:serviceaccount:kube-system:local-path-provisioner-service-account"
    verbs: ["get", "list", "watch"]

  # 노드 자체 조회 노이즈 제거 (2026-07-15 실측 추가): get/list/watch는 읽기라
  # 위험이 낮아 nodes 리소스 전체에 적용한다.
  - level: None
    userGroups:
      - "system:nodes"
    resources:
      - group: ""
        resources:
          - "nodes"
    verbs: ["get", "list", "watch"]

  # 노드 하트비트(nodes/status patch) 노이즈 제거 (2026-07-15 실측 추가):
  # kubelet의 patch/update는 실측 결과 전부 subresource=status(10초 주기
  # 상태 보고)였다. 서브리소스를 status로 좁혀서, 같은 신원이 taint/label 등
  # nodes 본문(스펙)을 건드리는 patch/update는 계속 기록되게 한다 - 침해된
  # kubelet이 자기 노드의 스케줄링 제약을 스스로 풀어버리는 시나리오 대비.
  - level: None
    userGroups:
      - "system:nodes"
    resources:
      - group: ""
        resources:
          - "nodes/status"
    verbs: ["patch", "update"]

  # coordination.k8s.io Lease heartbeat 노이즈 제거 (2026-07-15 실측 추가):
  # 10초 주기 heartbeat를 update하는 것 - 5000건 샘플 중 leases update가
  # 1127건(22.5%)으로 단일 최대 노이즈원이었다. namespaces를 kube-node-lease로
  # 좁혀서 리더일렉션용 Lease(kube-system 등) 조작은 계속 잡히게 한다.

  - level: None
    userGroups:
      - "system:nodes"
    namespaces:
      - "kube-node-lease"
    resources:
      - group: "coordination.k8s.io"
        resources:
          - "leases"

  # 컨트롤 플레인 컴포넌트의 리더일렉션/identity Lease 하트비트 노이즈 제거
  # (2026-07-15 실측 추가): system:apiserver가 kube-system 네임스페이스에서
  # 갱신하는 APIServerIdentity lease가 292건 남아 있었다 - 위 node-lease
  # 규칙은 namespace를 kube-node-lease로 좁혀놨기 때문에 이건 못 잡는다.
  # userGroups가 아니라 개별 신원이라 users로 별도 규칙을 둔다.
  - level: None
    users:
      - "system:apiserver"
      - "system:k3s-controller"
      - "system:k3s-supervisor"
      - "k3s-cloud-controller-manager"
    resources:
      - group: "coordination.k8s.io"
        resources:
          - "leases"

  # k8s 표준 Event 오브젝트 노이즈 제거 (2026-07-15 실측 추가): 감사 로그의
  # audit Event가 아니라 `kubectl get events`로 보이는 상태 알림용 Event
  # 리소스다. kubelet/controller들이 정상 동작 중에도 계속 create/patch하며
  # (샘플 중 408건, 8.2%) 리소스 자체에 보안적 의미가 없어 공식 예시 audit
  # 정책도 관례적으로 제외한다. 구버전 core group과 신버전 events.k8s.io
  # group 둘 다 쓰이므로 둘 다 등록한다. verbs를 create/update/patch로만
  # 좁혀서 delete/deletecollection은 catch-all Metadata에 걸리게 둔다 -
  # 공격자가 흔적 인멸용으로 Event를 지우는 경우까지 놓치지 않기 위함.
  - level: None
    resources:
      - group: ""
        resources:
          - "events"
      - group: "events.k8s.io"
        resources:
          - "events"
    verbs: ["create", "update", "patch"]

  # authz/authn 자체 점검 노이즈 제거 (2026-07-15 실측 추가): 5000건 샘플에서
  # 이 리소스를 호출한 신원은 system:k3s-controller/system:k3s-supervisor/
  # system:nodes/metrics-server 4종뿐이었다. 리소스 기준으로 전체를 걸지 않고
  # 신원으로 좁히는 이유 - subjectaccessreviews/tokenreviews는 `kubectl auth
  # can-i` 류의 권한 정찰(MITRE T1069)에 쓰이는 리소스라, 낯선 신원(침해된
  # 파드의 기본 SA, 외부 신원 등)이 이걸 호출하면 그 자체가 이상 신호다 -
  # 전체를 None으로 걸면 그 정찰 행위 자체가 안 보이게 된다.
  - level: None
    users:
      - "system:k3s-controller"
      - "system:k3s-supervisor"
      - "system:serviceaccount:kube-system:metrics-server"
    resources:
      - group: "authorization.k8s.io"
        resources:
          - "subjectaccessreviews"
          - "selfsubjectaccessreviews"
          - "selfsubjectrulesreviews"
      - group: "authentication.k8s.io"
        resources:
          - "tokenreviews"

  - level: None
    userGroups:
      - "system:nodes"
    resources:
      - group: "authorization.k8s.io"
        resources:
          - "subjectaccessreviews"
          - "selfsubjectaccessreviews"
          - "selfsubjectrulesreviews"
      - group: "authentication.k8s.io"
        resources:
          - "tokenreviews"

  - level: None
    nonResourceURLs:
      - "/healthz*"
      - "/livez*"
      - "/readyz*"
      - "/metrics"
      - "/version"

  # ── SA 토큰 자동 발급 노이즈 제거 (2026-07-14, S25 재료): 실측 확인 결과 이
  #    클러스터의 create serviceaccounts/token은 거의 전부 kubelet(매 pod의
  #    projected volume bound-token을 몇 분 주기로 갱신, user=system:node:*)과
  #    kube-controller-manager의 내부 호출이었다 - 아래 rules.py의 아래쪽
  #    "그 외 모든 요청은 Metadata로 기록" 규칙에 걸리면 이 두 신원만으로도
  #    상관분석 노이즈가 압도적으로 커진다. 이 두 신원만 걸러내면 남는 요청은
  #    사람/외부 신원이 TokenRequest API를 명시적으로 호출한 드문 이벤트가 된다
  #    (S25: ServiceAccount 토큰 명시적 발급 정황, T1550). users/userGroups를
  #    한 규칙에 같이 쓰면 AND로 묶여 의도가 달라지므로 두 규칙으로 분리했다.
  - level: None
    userGroups:
      - "system:nodes"
    resources:
      - group: ""
        resources:
          - "serviceaccounts/token"
    verbs: ["create"]

  - level: None
    users:
      - "system:kube-controller-manager"
    resources:
      - group: ""
        resources:
          - "serviceaccounts/token"
    verbs: ["create"]

  # ── RBAC 권한 상승/과다 요청 탐지: 실제로 어떤 권한을 부여했는지 봐야 하므로
  #    요청/응답 본문까지 전부 남긴다. 아래 리소스 4개는 IDS-COLLECTOR의
  #    ids_shared.k8s_constants.RBAC_ALL_RESOURCES와 같은 뜻(normalizer/
  #    correlation-engine의 severity.yaml·rbac.yaml에도 같은 목록이 있다) - 이
  #    파일은 kube-apiserver가 직접 읽어서 Python 쪽과 자동으로 공유할 수 없으니
  #    목록을 바꾸면 IDS-COLLECTOR 쪽도 수동으로 같이 고칠 것 ──
  - level: RequestResponse
    resources:
      - group: "rbac.authorization.k8s.io"
        resources:
          - "roles"
          - "clusterroles"
          - "rolebindings"
          - "clusterrolebindings"
    verbs: ["create", "update", "patch", "delete"]

  # ── Pod 탈옥(컨테이너 이스케이프) 정황 탐지: privileged/hostNetwork/hostPID/hostIPC/
  #    hostPath 마운트 여부가 전부 pod spec(요청 본문) 안에만 있어서 Metadata
  #    레벨(verb/resource만)로는 절대 판정 불가능하다. 응답 본문은 필요 없고(생성
  #    요청 자체의 spec만 보면 됨) 이 필드들은 생성 이후 수정 불가능한 불변
  #    필드라 verb도 create만 있으면 충분해서 RequestResponse가 아니라 Request로
  #    제한해 로그量을 절반으로 줄인다 ──
  - level: Request
    resources:
      - group: ""
        resources:
          - "pods"
    verbs: ["create"]

  # ── NodePort Service 노출 탐지: spec.type이 요청 본문에만 있어서 Metadata로는
  #    판정 불가능하다. pod의 hostNetwork류(생성 후 불변)와 달리 spec.type은
  #    ClusterIP로 만든 뒤 patch/update로 NodePort로 바꿀 수 있어서 create만 보면
  #    그 경로를 놓친다 - update/patch도 포함 ──
  - level: Request
    resources:
      - group: ""
        resources:
          - "services"
    verbs: ["create", "update", "patch"]

  # ── ConfigMap에 시크릿처럼 평문 자격증명을 넣는 실수 탐지: Secret과 달리 ConfigMap은
  #    암호화/난독화 없이 저장되므로 data/binaryData 내용을 봐야 한다. 생성뿐 아니라
  #    수정으로도 자격증명이 들어갈 수 있어 update/patch도 포함 ──
  - level: Request
    resources:
      - group: ""
        resources:
          - "configmaps"
    verbs: ["create", "update", "patch"]

  # ── TLS 없는 Ingress 노출 탐지 (2026-07-14, S24 재료): spec.tls 존재 여부가
  #    요청 본문에만 있어서 Metadata로는 판정 불가능하다. falcosecurity/plugins의
  #    "Ingress Object without TLS Certificate Created" 룰이 kcreate(생성 시점)만
  #    보므로 이 프로젝트도 create만 잡는다(응답 본문은 필요 없어 Request로 제한) ──
  - level: Request
    resources:
      - group: "networking.k8s.io"
        resources:
          - "ingresses"
    verbs: ["create"]

  # ── ServiceAccount 탈취 시도 탐지: 누가/언제/어떤 SA에 접근했는지가 핵심이라
  #    Metadata 레벨로 남긴다 (Secret/토큰 원문을 로그 파일에 그대로 남기지 않기 위함) ──
  - level: Metadata
    resources:
      - group: ""
        resources:
          - "serviceaccounts"
          - "serviceaccounts/token"
          - "secrets"

  # ── 그 외 클러스터 상태를 바꾸는 모든 요청은 최소 Metadata 레벨로 기록 ──
  - level: Metadata
    verbs: ["create", "update", "patch", "delete", "deletecollection"]

  # ── 나머지 API 호출(조회 포함)도 비정상 호출 패턴 탐지를 위해 기본적으로 수집 ──
  - level: Metadata
