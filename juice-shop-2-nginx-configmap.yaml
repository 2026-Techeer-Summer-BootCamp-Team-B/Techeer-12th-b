apiVersion: v1
kind: ConfigMap
metadata:
  name: juice-shop-2-nginx-conf
data:
  # juice-shop-nginx-configmap.yaml을 그대로 복제 - TARGET_NAME만 이 타깃에 맞게
  # 바뀔 값이라 템플릿 자체는 손댈 게 없다(POD_NAME/POD_NAMESPACE/TARGET_NAME 전부
  # 컨테이너 env로 치환되므로). 두 번째 타깃을 추가할 때 이 파일이 "복제-리네임"
  # 대상이라는 걸 실증하기 위한 두 번째 세트 - juice-shop-with-nginx-sidecar.yaml/
  # juice-shop-nginx-configmap.yaml의 원본 코멘트 참고.
  #
  # log_format의 "referrer" 키(2026-07-15, "referer"에서 수정)에 대한 설명도
  # juice-shop-nginx-configmap.yaml 원본 코멘트 참고 - IDS-COLLECTOR의
  # normalize_was()가 payload.get("referrer")로 읽으므로 두 타깃 모두 같은 키를
  # 써야 한다(복제본이라 이 드리프트도 원본과 동시에 있었고 동시에 고쳐짐).
  default.conf.template: |
    log_format was_json escape=json
      '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"method":"$request_method",'
        '"path":"$uri",'
        '"query":"$args",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"user_agent":"$http_user_agent",'
        '"referrer":"$http_referer",'
        '"x_forwarded_for":"$http_x_forwarded_for",'
        '"orchestrator_namespace":"${POD_NAMESPACE}",'
        '"orchestrator_pod":"${POD_NAME}",'
        '"target_name":"${TARGET_NAME}"'
      '}';

    error_log /dev/stderr warn;

    server {
      listen 8080;

      # juice-shop-nginx-configmap.yaml과 동일한 이유 - nginx:alpine 기본
      # access_log(/dev/stdout으로 심링크됨)와 http 레벨에서 나란히 두면 요청마다
      # 줄이 2개 찍히고, `access_log off;`로 지우면 같은 레벨의 was_json 지시문도
      # 같이 취소돼(nginx 문서: off는 "현재 레벨의 모든 access_log 지시문을 취소")
      # 로그가 아예 안 나간다(2026-07-15 실측 확인, off는 답이 아니었음). server
      # 블록 안으로 옮겨서 부모(http) 지시문을 자식 컨텍스트가 자동으로 대체하게
      # 한다.
      access_log /dev/stdout was_json;

      location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        add_header X-Served-By-Pod "${POD_NAME}" always;
        add_header X-Served-By-Namespace "${POD_NAMESPACE}" always;
      }
    }
