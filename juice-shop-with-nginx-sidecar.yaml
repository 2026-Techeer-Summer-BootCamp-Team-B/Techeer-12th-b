apiVersion: apps/v1
kind: Deployment
metadata:
  name: juice-shop
  labels:
    app: juice-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: juice-shop
  template:
    metadata:
      labels:
        app: juice-shop
    spec:
      containers:
        # 원래 있던 Juice Shop 컨테이너 - 외부에 직접 노출하지 않고
        # 같은 Pod 안의 nginx가 앞단에서 받아서 넘겨주는 구조로 바뀜
        - name: juice-shop
          image: bkimminich/juice-shop
          ports:
            - containerPort: 3000

        # 신규 - WAS 로그 소스 역할. Juice Shop 자체는 요청 로그를 안 남기므로
        # 이 nginx가 대신 access log를 stdout에 남긴다.
        - name: nginx-was-logger
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8080
          env:
            # nginx-conf 템플릿의 ${POD_NAME}/${POD_NAMESPACE}를 시작 시 실제 값으로
            # 치환하는 데 쓴다(Downward API) - 재배포로 pod 이름이 바뀌어도 이 값은
            # 항상 그 pod 자신의 실제 이름을 가리킨다.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            # /etc/nginx/nginx.conf(기본 이미지 제공, 건드리지 않음)가 여기 conf.d를
            # include하고, 공식 이미지의 entrypoint가 시작 시 이 템플릿을 envsubst로
            # 렌더링해서 conf.d에 떨궈준다 - juice-shop-nginx-configmap.yaml 참고.
            - name: nginx-conf
              mountPath: /etc/nginx/templates/default.conf.template
              subPath: default.conf.template
      volumes:
        - name: nginx-conf
          configMap:
            name: juice-shop-nginx-conf
---
apiVersion: v1
kind: Service
metadata:
  name: juice-shop
spec:
  selector:
    app: juice-shop
  ports:
    # 이제 서비스가 가리키는 포트는 nginx(8080) - 
    # 클라이언트는 항상 nginx를 거쳐서 juice-shop에 도달하게 됨
    - port: 3000
      targetPort: 8080
