# 1. Falco 헬름 리포지토리 등록 (최초 1회)
# helm repo add falcosecurity https://falcosecurity.github.io/charts
#helm repo update

# 2. Git으로 공유받은 values.yaml 파일을 사용해 설치/업그레이드
#helm upgrade --install falco falcosecurity/falco -n falco --create-namespace -f falco-values.yaml
#
# http_output(백엔드 /api/alerts로 직접 POST)은 더 이상 쓰지 않는다. 이제 Falco는
# json_output만 켜두고 stdout에 JSON을 남기면, otel-collector가 Falco 파드의 컨테이너 로그
# 파일(/var/log/pods/...)을 tail해서 OTLP로 중앙 수집한다 (otel-collector-config.yaml 참고).

driver:
  kind: modern_ebpf

tty: true

falco:
  json_output: true

# 크립토마이닝 탐지 (2026-07-14, S22/T1496 재료). 코어 falco_rules.yaml이 아니라
# falcosecurity/rules 저장소의 falco-sandbox_rules.yaml에 있는 3개 룰을 그대로
# 옮겼다(WebFetch로 원본 재확인, S1의 "Terminal shell in container"류와 같은
# 근거 수준 - 만들어낸 게 아님). "Detect outbound connections to common miner
# pool ports"는 원본이 enabled: false(오탐 가능성 때문에 기본 꺼짐)라 여기서
# 명시적으로 true로 재정의해서 켠다 - 이 프로젝트는 단일 데모 클러스터라 실제
# 마이너 풀 도메인/포트로 나가는 트래픽이 있을 리 없어서 오탐 리스크가 낮다.
customRules:
  # severity.yaml의 falco.priority 매핑(Notice->1)에서 묻히는 시나리오 재료 룰의
  # priority를 재정의한다 (2026-07-15). "Terminal shell in container"는
  # correlation-engine의 S1(workload.yaml stage2)/S5(network.yaml stage2) 재료로
  # "WAF CRITICAL 차단 이후 실제 컨테이너 침투 확인"급 신호인데, falcosecurity/rules
  # 코어 falco_rules.yaml 원본은 priority: NOTICE라 개별 이벤트 severity가 1로 묻힌다
  # (WebFetch로 원본 재확인, 2026-07-15). condition/output은 원본 그대로 두고
  # priority만 WARNING(severity 2)으로 올린다 - 이 이벤트 단독으로는 아직 "의심" 수준
  # 취급(대량 kubectl exec 디버깅 등 오탐 가능성이 있어 CRITICAL까지는 안 감)이고,
  # 실제 "확실한 침투"급 판정은 S5 상관분석(사전 WAF CRITICAL 차단 + 이 룰 매칭 시
  # incident severity 4)이 담당한다 - 여기서 severity를 4까지 올리면 상관분석 계층의
  # 역할과 중복/충돌한다.
  #
  # "Contact K8S API Server From Container"(같은 두 시나리오의 stage2 후보)는 일부러
  # 안 건드린다 - 전체 Falco 이벤트의 절반 이상을 차지하는 정상 컨트롤러 트래픽
  # 노이즈로 이미 확인됨(dashboard InfrastructureView.jsx의 exclusion rule EX-01
  # 참고, 원본도 NOTICE로 동일 확인함) - priority를 올리면 정상 트래픽에 경보가
  # 남발된다.
  rules-severity-overrides.yaml: |-
    - rule: Terminal shell in container
      priority: WARNING
      override:
        priority: replace

  rules-cryptomining.yaml: |-
    - list: miner_ports
      items: [
            25, 3333, 3334, 3335, 3336, 3357, 4444,
            5555, 5556, 5588, 5730, 6099, 6666, 7777,
            7778, 8000, 8001, 8008, 8080, 8118, 8333,
            8888, 8899, 9332, 9999, 14433, 14444,
            45560, 45700
        ]

    - list: miner_domains
      items: [
          "asia1.ethpool.org","ca.minexmr.com",
          "cn.stratum.slushpool.com","de.minexmr.com",
          "eth-ar.dwarfpool.com","eth-asia.dwarfpool.com",
          "eth-asia1.nanopool.org","eth-au.dwarfpool.com",
          "eth-au1.nanopool.org","eth-br.dwarfpool.com",
          "eth-cn.dwarfpool.com","eth-cn2.dwarfpool.com",
          "eth-eu.dwarfpool.com","eth-eu1.nanopool.org",
          "eth-eu2.nanopool.org","eth-hk.dwarfpool.com",
          "eth-jp1.nanopool.org","eth-ru.dwarfpool.com",
          "eth-ru2.dwarfpool.com","eth-sg.dwarfpool.com",
          "eth-us-east1.nanopool.org","eth-us-west1.nanopool.org",
          "eth-us.dwarfpool.com","eth-us2.dwarfpool.com",
          "eu.stratum.slushpool.com","eu1.ethermine.org",
          "eu1.ethpool.org","fr.minexmr.com",
          "mine.moneropool.com","mine.xmrpool.net",
          "pool.minexmr.com","pool.monero.hashvault.pro",
          "pool.supportxmr.com","sg.minexmr.com",
          "sg.stratum.slushpool.com","stratum-eth.antpool.com",
          "stratum-ltc.antpool.com","stratum-zec.antpool.com",
          "stratum.antpool.com","us-east.stratum.slushpool.com",
          "us1.ethermine.org","us1.ethpool.org",
          "us2.ethermine.org","us2.ethpool.org",
          "xmr-asia1.nanopool.org","xmr-au1.nanopool.org",
          "xmr-eu1.nanopool.org","xmr-eu2.nanopool.org",
          "xmr-jp1.nanopool.org","xmr-us-east1.nanopool.org",
          "xmr-us-west1.nanopool.org","xmr.crypto-pool.fr",
          "xmr.pool.minergate.com", "rx.unmineable.com",
          "ss.antpool.com","dash.antpool.com",
          "eth.antpool.com","zec.antpool.com",
          "xmc.antpool.com","btm.antpool.com",
          "stratum-dash.antpool.com","stratum-xmc.antpool.com",
          "stratum-btm.antpool.com"
          ]

    - list: https_miner_domains
      items: [
        "ca.minexmr.com",
        "cn.stratum.slushpool.com",
        "de.minexmr.com",
        "fr.minexmr.com",
        "mine.moneropool.com",
        "mine.xmrpool.net",
        "pool.minexmr.com",
        "sg.minexmr.com",
        "stratum-eth.antpool.com",
        "stratum-ltc.antpool.com",
        "stratum-zec.antpool.com",
        "stratum.antpool.com",
        "xmr.crypto-pool.fr",
        "ss.antpool.com",
        "stratum-dash.antpool.com",
        "stratum-xmc.antpool.com",
        "stratum-btm.antpool.com",
        "btm.antpool.com"
      ]

    - list: http_miner_domains
      items: [
        "ca.minexmr.com",
        "de.minexmr.com",
        "fr.minexmr.com",
        "mine.moneropool.com",
        "mine.xmrpool.net",
        "pool.minexmr.com",
        "sg.minexmr.com",
        "xmr.crypto-pool.fr"
      ]

    - list: miner_binaries
      items: [
        xmrig, xmr-stak, minerd, minergate, cpuminer, ccminer,
        ethminer, cgminer, bfgminer, sgminer, claymore, nbminer,
        t-rex, gminer, lolminer, phoenixminer, teamredminer,
        nanominer, bminer, wildrig, srbminer
      ]

    - macro: minerpool_https
      condition: (fd.sport="443" and fd.sip.name in (https_miner_domains))

    - macro: minerpool_http
      condition: (fd.sport="80" and fd.sip.name in (http_miner_domains))

    - macro: minerpool_other
      condition: (fd.sport in (miner_ports) and fd.sip.name in (miner_domains))

    - macro: net_miner_pool
      condition: (evt.type in (sendto, sendmsg, connect) and (fd.net != "127.0.0.0/8" and not fd.snet in (rfc_1918_addresses)) and ((minerpool_http) or (minerpool_https) or (minerpool_other)))

    - macro: trusted_images_query_miner_domain_dns
      condition: (container.image.repository in (falco_containers))

    - macro: is_miner_process
      condition: (proc.name in (miner_binaries))

    - rule: Detect outbound connections to common miner pool ports
      desc: >
        Miners usually connect to miner pools using standard ports, and this rule flags such activity.
      condition: >
        net_miner_pool
        and not trusted_images_query_miner_domain_dns
      output: >
        Outbound connection to IP/Port flagged by https://cryptoioc.ch (command=%proc.cmdline pid=%proc.pid port=%fd.rport ip=%fd.rip container=%container.info image=%container.image.repository)
      priority: CRITICAL
      tags: [network, mitre_execution]
      enabled: true

    - rule: Detect crypto miners using the Stratum protocol
      desc: >
        Miners typically specify the mining pool to connect with a URI that begins with stratum+tcp,
        because Stratum is a line-based protocol using a plain TCP socket.
      condition: >
        spawned_process
        and (proc.cmdline contains "stratum+tcp" or
             proc.cmdline contains "stratum2+tcp" or
             proc.cmdline contains "stratum+ssl" or
             proc.cmdline contains "stratum2+ssl")
      output: >
        Possible miner running (command=%proc.cmdline pid=%proc.pid container=%container.info image=%container.image.repository)
      priority: CRITICAL
      tags: [process, mitre_execution]

    - rule: Known Cryptominer Process Executed
      desc: >
        Detect the execution of a process with a name that matches a well-known cryptocurrency miner binary.
      condition: >
        spawned_process
        and is_miner_process
      output: >
        Cryptocurrency miner process detected (command=%proc.cmdline pid=%proc.pid container=%container.info image=%container.image.repository)
      priority: CRITICAL
      tags: [process, mitre_execution]

  # 컨테이너 내부 OS 계정 생성 탐지 (2026-07-18, correlation-engine S53/T1136 재료).
  # falcosecurity/event-generator + Atomic Red Team(T1136.001) + OWASP ZAP으로
  # correlation-engine 전체 시나리오를 재검증하다가 발견 - useradd로 컨테이너 안에
  # 새 Linux 계정을 만들어도(실측: `useradd -M -N -r -s /bin/sh evilbackdoor`)
  # falcosecurity/rules 코어 falco_rules.yaml에는 대응 룰이 없다(passwd_binaries/
  # shadowutils_binaries 리스트는 있지만 "이 바이너리가 실행되면 알림"이라는 룰 자체가
  # 없고, "Read sensitive file untrusted"류 룰의 신뢰 프로그램 예외 목록으로만 쓰임 -
  # 즉 코어 룰셋 관점에서는 이 바이너리들이 "정상적으로 민감 파일을 만지는 도구"로만
  # 취급되지 "이게 실행되는 것 자체가 이상 신호"라는 관점이 없다). 이 프로젝트
  # 워크로드(Juice Shop, WAF backend)는 전부 stateless 앱이라 정상 운영 중
  # useradd/adduser/newusers가 실행될 이유가 없어 이 환경 전용으로 추가해도 오탐
  # 위험이 낮다 - 일반 호스트 전체에 적용할 룰이었다면 관리자의 정상 계정 관리
  # 작업과 겹쳐 노이즈가 컸을 것(코어 룰셋이 이 바이너리들을 "룰"로 안 만든 이유도
  # 아마 그 오탐 때문일 것으로 추정).
  rules-account-creation.yaml: |-
    - list: account_creation_binaries
      items: [useradd, adduser, newusers]

    - rule: Account Creation Inside Container
      desc: >
        Detect creation of a new OS-level user account inside a container via
        useradd/adduser/newusers. This project's workloads (Juice Shop, WAF
        backend) are stateless apps with no legitimate reason to run these
        binaries during normal operation, so execution is a strong signal of
        backdoor account creation (MITRE T1136).
      condition: >
        spawned_process
        and container
        and proc.name in (account_creation_binaries)
      output: >
        OS account creation binary executed inside a container (command=%proc.cmdline pid=%proc.pid user=%user.name container=%container.info image=%container.image.repository)
      priority: WARNING
      tags: [process, mitre_persistence, T1136]
      enabled: true

  # 인터랙티브 정찰 탐지 (2026-07-22, correlation-engine S70/T1082 stage1 재료).
  # S70이 참조하는 event_action="Basic Interactive Reconnaissance"는 falcosecurity/rules
  # 코어 falco_rules.yaml이 아니라 sandbox 티어(falco-sandbox_rules.yaml)에만 있는
  # 룰이라(WebFetch로 원본 재확인, 2026-07-22) - 크립토마이닝 3개 룰과 동일하게
  # sandbox 티어에서 그대로 옮겨온다. w/whoami/id/who/uname을 인터랙티브 tty에서
  # (proc.tty != 0) 직접 타이핑해서(proc.is_vpgid_leader=true, 스크립트/kubectl exec
  # sh -c 실행은 해당 안 됨) 실행할 때만 발화 - 실측 확인: 이 룰이 배포 안 된 채로
  # 있어서 S70이 구조적으로 절대 발화 불가능한 상태였다(Atomic Red Team T1082로
  # 재현 시도 - kubectl exec sh -c 방식이라 tty가 없어 애초에 이 룰 조건과도 안
  # 맞았음, 인터랙티브 exec -it로 재현해야 함).
  rules-interactive-recon.yaml: |-
    - list: recon_binaries
      items: [w, whoami, id, who, uname]

    - macro: recon_binaries_procs
      condition: (proc.name in (recon_binaries))

    - rule: Basic Interactive Reconnaissance
      desc: >
        This rule detects basic interactive reconnaissance commands that are typically run by unsophisticated attackers or used
        in internal Red Team exercises. Interactive is defined as a terminal being present (proc.tty != 0). This could be any
        form of reverse shell or usage of kubectl exec or ssh etc. In addition, filtering for the process being the process group
        leader indicates that the command was "directly" typed into the terminal and not run as a result of a script. This rule
        is a basic auditing or template rule. You can expand the list of reconnaissance commands, such as by adding "ls". Common
        anti-patterns are SRE activity or debugging, but it is still worth capturing this generically. Typically, you would expect
        other rules to fire as well in relation to this activity.
      condition: >
        spawned_process
        and recon_binaries_procs
        and proc.tty != 0
        and proc.is_vpgid_leader=true
      output: Basic Interactive Reconnaissance | evt_type=%evt.type user=%user.name user_uid=%user.uid user_loginuid=%user.loginuid process=%proc.name proc_exepath=%proc.exepath parent=%proc.pname command=%proc.cmdline terminal=%proc.tty exe_flags=%evt.arg.flags
      priority: NOTICE
      tags: [maturity_sandbox, host, container, process, mitre_reconnaissance, TA0043]
      enabled: true

  # ServiceAccount 토큰 파일 열람 탐지 (2026-07-18, correlation-engine S56/T1552 재료).
  # DataDog stratus-red-team의 k8s.credential-access.steal-serviceaccount-token
  # 기법(pod에 exec해서 `cat /var/run/secrets/kubernetes.io/serviceaccount/token`으로
  # 마운트된 토큰을 그대로 읽어감)을 실제 클러스터에 재현하며 발견 - k8s_audit은
  # "create pods/exec" 요청이 있었다는 것만 기록하고 그 안에서 무슨 명령을 실행했는지는
  # 모르므로(S1의 stage1과 구분 불가), falco 쪽에서 파일 열람 자체를 봐야 한다.
  # falcosecurity/rules 코어 falco_rules.yaml의 sensitive_files 매크로(/etc/shadow 등
  # 전통적인 리눅스 파일 목록)에는 이 K8s 전용 경로가 없어 대응 룰이 없다(WebFetch로
  # 원본 재확인, 2026-07-18) - S53(계정 생성)과 같은 이유로 이 프로젝트 전용 커스텀
  # 룰이 필요했다. 이 프로젝트 워크로드(Juice Shop, WAF backend)는 애플리케이션
  # 코드에서 K8s API를 직접 호출하지 않아 자기 자신의 SA 토큰을 읽을 정상적인 이유가
  # 없으므로(정상 K8s client-go 기반 컨트롤러였다면 기동 시 1회 읽는 게 흔해 오탐이
  # 컸을 것) 이 환경 전용으로 추가해도 오탐 위험이 낮다.
  rules-token-theft.yaml: |-
    - macro: service_account_token_file
      condition: (fd.name endswith "kubernetes.io/serviceaccount/token")

    - rule: ServiceAccount Token File Read
      desc: >
        Detect a process inside a container reading the mounted Kubernetes
        ServiceAccount token file. This project's workloads (Juice Shop, WAF
        backend) never call the K8s API from application code, so there is no
        legitimate reason to open this file - a strong signal of an attacker
        stealing the pod's identity to reuse it outside the pod (MITRE T1552).
      condition: >
        open_read
        and container
        and service_account_token_file
      output: >
        ServiceAccount token file read inside container (command=%proc.cmdline pid=%proc.pid user=%user.name container=%container.info image=%container.image.repository file=%fd.name)
      priority: WARNING
      tags: [filesystem, mitre_credential_access, T1552]
      enabled: true