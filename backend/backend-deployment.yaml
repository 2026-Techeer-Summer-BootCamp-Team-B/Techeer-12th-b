# WAF 게이트웨이(이 리포지토리의 backend/) 배포 매니페스트.
#
# 비활성화됨 (주석 처리) — WAF가 차단을 하지 않고 로그만 남기는 구조로 바뀌면서, 그 로그
# 발생지 역할이 Juice Shop 쪽 WAS 로그(nginx-was-logger 사이드카, juice-shop-with-nginx-sidecar.yaml)
# 와 사실상 중복되어 WAS 쪽으로 완전히 대체했다. 코드/매니페스트는 지우지 않고 남겨둔다 —
# 나중에 다시 WAF 계층이 필요해지면 아래 전체를 주석 해제하고, otel-collector-config.yaml의
# otlp 리시버 + logs/waf 파이프라인도 함께 되살리면 된다.
#
# 사용법 (저장소 루트에서, backend/Dockerfile로 이미지를 먼저 빌드해 k3d에 주입한 뒤):
#   docker build -t techeer-waf-backend:latest backend/
#   k3d image import techeer-waf-backend:latest -c techeer-ids
#   kubectl apply -f backend/backend-deployment.yaml
#
# apiVersion: apps/v1
# kind: Deployment
# metadata:
#   name: backend
# spec:
#   replicas: 1
#   selector:
#     matchLabels:
#       app: backend
#   template:
#     metadata:
#       labels:
#         app: backend
#     spec:
#       containers:
#         - name: backend
#           image: techeer-waf-backend:latest
#           imagePullPolicy: IfNotPresent
#           ports:
#             - containerPort: 8000
#           env:
#             - name: TARGET_SERVICE_URL
#               value: "http://juice-shop:3000"
#             - name: OTEL_EXPORTER_OTLP_ENDPOINT
#               value: "http://otel-collector:4318"
#           readinessProbe:
#             httpGet:
#               path: /health
#               port: 8000
#             initialDelaySeconds: 3
#             periodSeconds: 5
# ---
# apiVersion: v1
# kind: Service
# metadata:
#   name: backend
# spec:
#   selector:
#     app: backend
#   ports:
#     - port: 8000
#       targetPort: 8000
#   # 로컬에서 dummy_generator.py 등으로 붙어서 테스트하려면
#   # kubectl port-forward svc/backend 8000:8000 사용
