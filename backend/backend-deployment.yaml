# WAF 게이트웨이(이 리포지토리의 backend/) 배포 매니페스트.
#
# 다시 활성화됨 — WAF 계층(탐지·로그만, 차단은 WAS 책임)을 다시 배포한다.
# otel-collector-config.yaml의 otlp 리시버 + logs/waf 파이프라인도 함께 되살렸다.
#
# 사용법 (저장소 루트에서, backend/Dockerfile로 이미지를 먼저 빌드해 k3d에 주입한 뒤):
#   docker build -t techeer-waf-backend:latest backend/
#   k3d image import techeer-waf-backend:latest -c techeer-ids
#   kubectl apply -f backend/backend-deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: techeer-waf-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: TARGET_SERVICE_URL
              value: "http://juice-shop:3000"
            # juice-shop-with-nginx-sidecar.yaml의 TARGET_NAME과 반드시 같은 값으로
            # 맞출 것 - IDS-COLLECTOR가 WAF/WAS 이벤트를 같은 타깃으로 묶는 기준이다
            # (app/config.py 참고).
            - name: TARGET_NAME
              value: "juice-shop"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4318"
            # kubectl port-forward는 kubelet이 pod의 네트워크 네임스페이스 안에서
            # 로컬 프록시로 연결하는 방식이라, pod 입장에서 direct 연결 IP가 항상
            # 127.0.0.1로 보인다. 이 값이 없으면 tests/dummy_generator.py가 보내는
            # X-Forwarded-For(가짜 IP 다양화, waf_actions.py 참고)가 proxy.py의
            # get_client_ip()에서 전부 무시돼 WafAlert.source_ip가 매번 127.0.0.1로만
            # 남는다. 운영 배포(Traefik 뒤)로 바뀌면 이 값을 Traefik의 실제 IP로
            # 바꿔야 한다 - 127.0.0.1은 로컬 port-forward 테스트 전용.
            - name: TRUSTED_PROXIES_RAW
              value: "127.0.0.1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
  # 로컬에서 dummy_generator.py 등으로 붙어서 테스트하려면
  # kubectl port-forward svc/backend 8000:8000 사용
