# WAF 게이트웨이(이 리포지토리의 backend/) 배포 매니페스트.
#
# 다시 활성화됨 — WAF 계층(탐지·로그만, 차단은 WAS 책임)을 다시 배포한다.
# otel-collector-config.yaml의 otlp 리시버 + logs/waf 파이프라인도 함께 되살렸다.
#
# 사용법 (저장소 루트에서, backend/Dockerfile로 이미지를 먼저 빌드해 k3d에 주입한 뒤):
#   docker build -t techeer-waf-backend:latest backend/
#   k3d image import techeer-waf-backend:latest -c techeer-ids
#   kubectl apply -f backend/backend-deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: techeer-waf-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: TARGET_SERVICE_URL
              value: "http://juice-shop:3000"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4318"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
  # 로컬에서 dummy_generator.py 등으로 붙어서 테스트하려면
  # kubectl port-forward svc/backend 8000:8000 사용
