# WAF 게이트웨이(이 리포지토리의 backend/) 배포 매니페스트.
#
# 비활성화됨 (주석 처리) — WAF가 차단을 하지 않고 로그만 남기는 구조로 바뀌면서, 그 로그
# 발생지 역할이 Juice Shop 쪽 WAS 로그(nginx-was-logger 사이드카, juice-shop-with-nginx-sidecar.yaml)
# 와 사실상 중복되어 WAS 쪽으로 완전히 대체했다. 코드/매니페스트는 지우지 않고 남겨둔다 —
# 나중에 다시 WAF 계층이 필요해지면 아래 전체를 주석 해제하고, otel-collector-config.yaml의
# otlp 리시버 + logs/waf 파이프라인도 함께 되살리면 된다.
#
# 사용법 (저장소 루트에서, backend/Dockerfile로 이미지를 먼저 빌드해 k3d에 주입한 뒤):
#   docker build -t techeer-waf-backend:latest backend/
#   k3d image import techeer-waf-backend:latest -c techeer-ids
#   kubectl apply -f backend/backend-deployment.yaml
#
# apiVersion: apps/v1
# kind: Deployment
# metadata:
#   name: backend
# spec:
#   replicas: 1
#   selector:
#     matchLabels:
#       app: backend
#   template:
#     metadata:
#       labels:
#         app: backend
#     spec:
#       containers:
#         - name: backend
#           image: techeer-waf-backend:latest
#           imagePullPolicy: IfNotPresent
#           ports:
#             - containerPort: 8000
#           env:
#             - name: TARGET_SERVICE_URL
#               value: "http://juice-shop:3000"
#             - name: OTEL_EXPORTER_OTLP_ENDPOINT
#               value: "http://otel-collector:4318"
#             # app/otel/logger.py의 OTel export 실패 fallback 파일 경로 - 아래
#             # emptyDir 볼륨에 둬서 컨테이너가 재시작돼도(파드 자체가 재스케줄되지
#             # 않는 한) 같이 사라지지 않게 한다. /tmp(컨테이너 쓰기 레이어)에
#             # 두면 컨테이너 재시작만으로도 유실될 수 있어서 별도 볼륨으로 뺐다.
#             - name: OTEL_EXPORT_FALLBACK_PATH
#               value: "/var/lib/waf-otel-fallback/fallback.jsonl"
#           volumeMounts:
#             - name: otel-fallback
#               mountPath: /var/lib/waf-otel-fallback
#           readinessProbe:
#             httpGet:
#               path: /health
#               port: 8000
#             initialDelaySeconds: 3
#             periodSeconds: 5
#       volumes:
#         # emptyDir이라 파드 자체가 삭제/재스케줄되면 이것도 같이 사라진다 -
#         # 완전한 영속성이 필요하면 PersistentVolumeClaim으로 바꿀 것. 지금은
#         # "컨테이너 재시작 정도는 버틴다"는 수준의 절충안.
#         - name: otel-fallback
#           emptyDir: {}
