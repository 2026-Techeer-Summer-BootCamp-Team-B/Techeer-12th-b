# backend-deployment.yaml의 복제본 - 두 번째 타깃(juice-shop-2)을 보호하는 WAF
# backend 세트. 같은 이미지(techeer-waf-backend:latest, 별도 빌드 불필요)를 쓰고
# TARGET_SERVICE_URL/TARGET_NAME만 이 타깃에 맞게 바꿨다 - "여러 타깃 = 세트를
# 복제 배포"라는 설계를 실증하기 위한 두 번째 인스턴스.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-2
  template:
    metadata:
      labels:
        app: backend-2
    spec:
      containers:
        - name: backend
          image: techeer-waf-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: TARGET_SERVICE_URL
              value: "http://juice-shop-2:3000"
            - name: TARGET_NAME
              value: "juice-shop-2"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4318"
            - name: TRUSTED_PROXIES_RAW
              value: "127.0.0.1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend-2
spec:
  selector:
    app: backend-2
  ports:
    - port: 8000
      targetPort: 8000
