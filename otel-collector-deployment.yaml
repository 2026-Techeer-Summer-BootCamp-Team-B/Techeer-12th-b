# OTel Collector 배포. Falco와 마찬가지로 DaemonSet으로 띄운다 - 노드마다 로컬 로그
# (Falco stdout, 이 노드의 K8s Audit 로그)를 그 노드의 Collector가 직접 tail해야 하기 때문
# (hostPath는 노드 로컬이라 다른 노드의 파일을 볼 수 없다).
#
# K8s Audit 로그(/var/log/kubernetes/audit)는 서버 노드(server:0)에만 실제로 존재한다 -
# 에이전트 노드의 Collector는 그냥 매치되는 파일이 없어서 조용히 아무것도 안 보낸다 (정상 동작).
#
# 사용법: kubectl apply -f otel-collector-config.yaml -f otel-collector-deployment.yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector
spec:
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      # (2026-07-22) GCP hairpin NAT 제약 때문에 CENTRAL_SIEM_OTLP_ENDPOINT 도메인이
      # VM 자신의 공인 IP로는 dial이 안 된다(위 env 주석 참고) - 도메인 문자열은
      # 안 바꾸고 이 파드 안에서만 그 이름의 DNS 해석을 내부 IP로 돌린다. 그러면
      # TLS SNI/gRPC :authority 헤더 둘 다 그대로 도메인 이름을 유지해서 Traefik
      # 라우팅과 인증서 검증이 그대로 통과하고, 실제 TCP 연결만 내부망으로 나간다.
      hostAliases:
        - ip: "10.178.0.2"
          hostnames:
            - "35-216-79-173.sslip.io"
      # otel/opentelemetry-collector-contrib 기본 이미지는 non-root(10001) 유저라
      # 호스트의 audit.log / 파드 로그 파일을 읽을 권한이 없다. Falco도 특권 모드로 도는 것과
      # 같은 이유로 root로 올린다.
      securityContext:
        runAsUser: 0
      containers:
        - name: otel-collector
          # filelog 리시버 + container 파서 오퍼레이터는 contrib 배포판에만 있음
          image: otel/opentelemetry-collector-contrib:latest
          args:
            - --config=/etc/otelcol-contrib/config.yaml
          env:
            # Central SIEM이 이 수신 포트 앞단에 TLS 종단 + mTLS(클라이언트 인증서 필수
            # 검증)를 두면서 접속 대상을 공인 도메인으로 바꿨다. 예전엔 컨테이너 이름
            # (traefik:4317, siem-net 공유 네트워크로 직접 붙여서 resolve)을 썼지만,
            # 서버 인증서(Let's Encrypt)가 이 공인 도메인 앞으로만 발급돼 있어서 TLS
            # 핸드셰이크의 인증서 호스트명 검증 단계에서 "traefik"이라는 이름 자체가
            # 인증서에 없는 이름이라 거부된다 - TCP 연결 자체는 siem-net으로도 여전히
            # 되지만 TLS 레벨에서 막히므로 의미가 없다. 그래서 siem-net에 k3d 노드를
            # 직접 붙이는 워크어라운드(docker network connect ...)는 이 엔드포인트
            # 목적으로는 더 이상 필요 없다 - 공인 도메인으로 나가면 Traefik의 TLS 종단
            # 리스너가 받아준다.
            #
            # 클라이언트 인증서는 volumeMounts의 otel-client-cert(아래) 참고. exporter
            # TLS 설정은 otel-collector-config.yaml의 exporters.otlp.tls에 있다.
            #
            # (2026-07-22 실측 발견/수정) 이 도메인 그대로 두면 TLS는 통과하지만 dial
            # 자체가 "i/o timeout"으로 영구 실패한다 - Target과 Central SIEM이 지금 같은
            # GCP VM 위에서 도는데, GCP는 VM이 자신의 공인 IP로 나갔다가 되돌아오는
            # hairpin NAT을 지원하지 않는다(호스트 자신도 `curl 35.216.79.173:4317`이
            # 안 됨, `curl 127.0.0.1:4317`은 됨 - 실측 확인). endpoint 문자열 자체를
            # 내부 IP로 바꾸면 TLS SNI는 아래 hostAliases로 여전히 통과해도 gRPC의
            # HTTP/2 :authority 헤더가 IP로 나가버려 Traefik 라우팅이 안 맞고 404가
            # 남(실측 확인) - 그래서 endpoint 문자열은 그대로 두고 hostAliases(아래)로
            # 이 도메인 자체의 DNS 해석만 내부 IP로 돌린다.
            - name: CENTRAL_SIEM_OTLP_ENDPOINT
              value: "35-216-79-173.sslip.io:4317"
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol-contrib/config.yaml
              subPath: config.yaml
            - name: pod-logs
              mountPath: /var/log/pods
              readOnly: true
            - name: k8s-audit-logs
              mountPath: /var/log/kubernetes/audit
              readOnly: true
            # Central SIEM으로 나가는 gRPC exporter가 mTLS로 제시할 클라이언트 인증서.
            # Secret은 이 매니페스트로 만들지 않는다 - 인증서/개인키 바이트를 git이나
            # 매니페스트에 남기지 않기 위해 배포 시점에 별도로 생성한다:
            #   kubectl create secret generic otel-client-cert \
            #     --from-file=client.crt=<식별자>-client.crt \
            #     --from-file=client.key=<식별자>-client.key
            - name: otel-client-cert
              mountPath: /etc/otel/client-certs
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
        - name: pod-logs
          hostPath:
            path: /var/log/pods
            type: DirectoryOrCreate
        - name: k8s-audit-logs
          hostPath:
            path: /var/log/kubernetes/audit
            type: DirectoryOrCreate
        # optional을 안 주면 기본값은 false(필수)다 - 일부러 그대로 둔다. 인증서가
        # 없으면 어차피 Central SIEM으로 나가는 모든 export가 TLS 핸드셰이크부터
        # 실패해서 로그가 전부 유실되는데, 그 상태로 파드가 "정상 Running"으로 조용히
        # 뜨는 것보다는 Secret이 없으면 ContainerCreating에 멈춰서 kubectl get pods로
        # 바로 눈에 띄는 쪽이 낫다. optional: true로 바꾸면 Secret 없이도 뜨긴 하지만,
        # 그 경우 WAS/Falco/K8s Audit 로그가 조용히 안 나가는 상태를 아무도 못 알아채는
        # 채로 방치될 위험이 더 크다고 판단했다.
        - name: otel-client-cert
          secret:
            secretName: otel-client-cert
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
