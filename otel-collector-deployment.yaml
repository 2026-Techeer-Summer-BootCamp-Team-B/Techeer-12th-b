# OTel Collector 배포. Falco와 마찬가지로 DaemonSet으로 띄운다 - 노드마다 로컬 로그
# (Falco stdout, 이 노드의 K8s Audit 로그)를 그 노드의 Collector가 직접 tail해야 하기 때문
# (hostPath는 노드 로컬이라 다른 노드의 파일을 볼 수 없다).
#
# K8s Audit 로그(/var/log/kubernetes/audit)는 서버 노드(server:0)에만 실제로 존재한다 -
# 에이전트 노드의 Collector는 그냥 매치되는 파일이 없어서 조용히 아무것도 안 보낸다 (정상 동작).
#
# 사용법: kubectl apply -f otel-collector-config.yaml -f otel-collector-deployment.yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector
spec:
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      # otel/opentelemetry-collector-contrib 기본 이미지는 non-root(10001) 유저라
      # 호스트의 audit.log / 파드 로그 파일을 읽을 권한이 없다. Falco도 특권 모드로 도는 것과
      # 같은 이유로 root로 올린다.
      securityContext:
        runAsUser: 0
      containers:
        - name: otel-collector
          # filelog 리시버 + container 파서 오퍼레이터는 contrib 배포판에만 있음
          image: otel/opentelemetry-collector-contrib:latest
          args:
            - --config=/etc/otelcol-contrib/config.yaml
          env:
            # host.docker.internal 경유는 버렸다 - k3d 노드(Docker Desktop VM 위 컨테이너)에서
            # 나가서 호스트로 갔다가 docker-proxy를 거쳐 다시 컨테이너로 들어오는 중첩 NAT
            # 경로인데, 이 경로에서 gRPC(h2c) 핸드셰이크가 preface 단계에서 깨지는 문제가
            # 있었다 ("error reading server preface: EOF"). TCP connect는 되는데 HTTP/2
            # 핸드셰이크만 실패하는 걸 보면 vpnkit(Docker Desktop의 유저스페이스 NAT 프록시)
            # 쪽 문제로 보임.
            #
            # 어차피 k3d 노드도 IDS-COLLECTOR의 docker-compose 컨테이너들도 같은 Docker
            # Desktop VM 위의 형제 컨테이너라 host.docker.internal로 나갔다 들어올 이유가
            # 없다. 대신 k3d 노드 컨테이너 3개(server-0/agent-0/agent-1) 전부를
            # IDS-COLLECTOR가 쓰는 공유 네트워크 siem-net에 직접 붙인다:
            #   docker network connect siem-net k3d-techeer-ids-server-0
            #   docker network connect siem-net k3d-techeer-ids-agent-0
            #   docker network connect siem-net k3d-techeer-ids-agent-1
            #
            # 붙이고 나면 이 파드도 Docker 내장 DNS로 siem-net 위의 컨테이너 이름을 그대로
            # resolve할 수 있다 - IP를 하드코딩해서 컨테이너 재생성마다 갱신할 필요가 없다.
            #
            # gRPC(4317)는 otel-collector 컨테이너가 직접 물고 있지 않고 Traefik의
            # otlp-grpc 엔트리포인트로만 받는다 (h2c preface를 HTTP/1.1로 오인하는 문제를
            # Traefik v3 + loadbalancer.server.scheme=h2c 조합으로 해결해 둔 경로 - IDS-COLLECTOR의
            # servers/otel/docker-compose.yml, servers/proxy/traefik/traefik.yml 참고).
            # 그래서 otel-collector가 아니라 반드시 traefik 컨테이너를 목적지로 잡아야 한다.
            - name: CENTRAL_SIEM_OTLP_ENDPOINT
              value: "traefik:4317"
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol-contrib/config.yaml
              subPath: config.yaml
            - name: pod-logs
              mountPath: /var/log/pods
              readOnly: true
            - name: k8s-audit-logs
              mountPath: /var/log/kubernetes/audit
              readOnly: true
            # 크로스-서버 mTLS용 이 사이트(site-edge01) 클라 인증서 - otel-collector-mtls-client
            # Secret은 매니페스트가 아니라 kubectl create secret으로 수동 생성해뒀다
            # (인증서/개인키를 git에 커밋하지 않기 위해 - Techeer-12th-b/.gitignore의 certs/ 참고).
            - name: mtls-client-certs
              mountPath: /etc/otel/certs
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
        - name: pod-logs
          hostPath:
            path: /var/log/pods
            type: DirectoryOrCreate
        - name: k8s-audit-logs
          hostPath:
            path: /var/log/kubernetes/audit
            type: DirectoryOrCreate
        - name: mtls-client-certs
          secret:
            secretName: otel-collector-mtls-client
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
