# OTel Collector 배포. Falco와 마찬가지로 DaemonSet으로 띄운다 - 노드마다 로컬 로그
# (Falco stdout, 이 노드의 K8s Audit 로그)를 그 노드의 Collector가 직접 tail해야 하기 때문
# (hostPath는 노드 로컬이라 다른 노드의 파일을 볼 수 없다).
#
# K8s Audit 로그(/var/log/kubernetes/audit)는 서버 노드(server:0)에만 실제로 존재한다 -
# 에이전트 노드의 Collector는 그냥 매치되는 파일이 없어서 조용히 아무것도 안 보낸다 (정상 동작).
#
# 사용법: kubectl apply -f otel-collector-config.yaml -f otel-collector-deployment.yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector
spec:
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      # otel/opentelemetry-collector-contrib 기본 이미지는 non-root(10001) 유저라
      # 호스트의 audit.log / 파드 로그 파일을 읽을 권한이 없다. Falco도 특권 모드로 도는 것과
      # 같은 이유로 root로 올린다.
      securityContext:
        runAsUser: 0
      containers:
        - name: otel-collector
          # filelog 리시버 + container 파서 오퍼레이터는 contrib 배포판에만 있음
          image: otel/opentelemetry-collector-contrib:latest
          args:
            - --config=/etc/otelcol-contrib/config.yaml
          env:
            # host.docker.internal 경유는 버렸다 - k3d 노드(Docker Desktop VM 위 컨테이너)에서
            # 나가서 macOS 호스트로 갔다가 docker-proxy를 거쳐 다시 otel-collector 컨테이너로
            # 들어오는 중첩 NAT 경로인데, 이 경로에서 gRPC(h2c) 핸드셰이크가 preface 단계에서
            # 깨지는 문제가 있었다 ("error reading server preface: EOF"). TCP connect는 되는데
            # HTTP/2 핸드셰이크만 실패하는 걸 보면 vpnkit(Docker Desktop의 유저스페이스 NAT
            # 프록시) 쪽 문제로 보임.
            #
            # 어차피 k3d 노드도 ids-collector의 docker-compose 컨테이너들도 같은 Docker
            # Desktop VM 위의 형제 컨테이너라 host.docker.internal로 나갔다 들어올 이유가
            # 없다. 대신 k3d 노드 컨테이너들을 ids-collector의 docker 네트워크
            # (ids-collector_default)에 직접 붙이고 (`docker network connect
            # ids-collector_default <k3d 노드 컨테이너 이름>`, 3개 노드 전부), otel-collector
            # 컨테이너의 그 네트워크상 IP로 바로 찌른다 - 중첩 NAT를 아예 건너뛴다.
            #
            # 172.18.0.6은 `docker inspect ids-collector-otel-collector-1`로 확인한 현재 IP.
            # docker-compose를 내렸다 올리면(down/up) 컨테이너가 재생성되면서 IP가 바뀔 수
            # 있으니, 그럴 땐 같은 명령으로 다시 확인해서 이 값을 갱신할 것. (더 안정적인
            # 방법은 DNS 별칭 "otel-collector"를 쓰는 건데, 그건 k3d pod -> coredns ->
            # node resolv.conf -> docker 내장 DNS로 이어지는 경로가 실제로 동작하는지
            # 확인이 더 필요해서 일단 IP로 먼저 검증하는 중.)
            - name: CENTRAL_SIEM_OTLP_ENDPOINT
              value: "172.18.0.6:4317"
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol-contrib/config.yaml
              subPath: config.yaml
            - name: pod-logs
              mountPath: /var/log/pods
              readOnly: true
            - name: k8s-audit-logs
              mountPath: /var/log/kubernetes/audit
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
        - name: pod-logs
          hostPath:
            path: /var/log/pods
            type: DirectoryOrCreate
        - name: k8s-audit-logs
          hostPath:
            path: /var/log/kubernetes/audit
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
