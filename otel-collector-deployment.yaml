# OTel Collector 배포. Falco와 마찬가지로 DaemonSet으로 띄운다 - 노드마다 로컬 로그
# (Falco stdout, 이 노드의 K8s Audit 로그)를 그 노드의 Collector가 직접 tail해야 하기 때문
# (hostPath는 노드 로컬이라 다른 노드의 파일을 볼 수 없다).
#
# K8s Audit 로그(/var/log/kubernetes/audit)는 서버 노드(server:0)에만 실제로 존재한다 -
# 에이전트 노드의 Collector는 그냥 매치되는 파일이 없어서 조용히 아무것도 안 보낸다 (정상 동작).
#
# 사용법: kubectl apply -f otel-collector-config.yaml -f otel-collector-deployment.yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector
spec:
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      # otel/opentelemetry-collector-contrib 기본 이미지는 non-root(10001) 유저라
      # 호스트의 audit.log / 파드 로그 파일을 읽을 권한이 없다. Falco도 특권 모드로 도는 것과
      # 같은 이유로 root로 올린다.
      securityContext:
        runAsUser: 0
      containers:
        - name: otel-collector
          # filelog 리시버 + container 파서 오퍼레이터는 contrib 배포판에만 있음
          image: otel/opentelemetry-collector-contrib:latest
          args:
            - --config=/etc/otelcol-contrib/config.yaml
          env:
            # Central SIEM이 아직 없어서 우선 placeholder를 넣어둔다 - 실제 주소가 정해지면
            # 이 값만 바꾸면 됨 (연결 실패해도 Collector는 재시도만 하고 죽지 않는다).
            - name: CENTRAL_SIEM_OTLP_ENDPOINT
              value: "http://central-siem.example.internal:4317"
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol-contrib/config.yaml
              subPath: config.yaml
            - name: pod-logs
              mountPath: /var/log/pods
              readOnly: true
            - name: k8s-audit-logs
              mountPath: /var/log/kubernetes/audit
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
        - name: pod-logs
          hostPath:
            path: /var/log/pods
            type: DirectoryOrCreate
        - name: k8s-audit-logs
          hostPath:
            path: /var/log/kubernetes/audit
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
