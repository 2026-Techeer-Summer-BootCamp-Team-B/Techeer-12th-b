apiVersion: v1
kind: ConfigMap
metadata:
  name: juice-shop-nginx-conf
data:
  nginx.conf: |
    # Juice Shop 앞단에서 요청/응답을 그대로 통과시키면서 access log만 남기는 설정.
    # WAF처럼 차단하는 게 아니라, "요청이 있었다"는 사실만 stdout에 기록하는 게 목적.

    events {}

    http {
      # JSON 형태로 로그를 남겨야 나중에 OTel Collector가 파싱하기 편함
      log_format was_json escape=json
        '{'
          '"time":"$time_iso8601",'
          '"remote_addr":"$remote_addr",'
          '"http_x_forwarded_for":"$http_x_forwarded_for",'
          '"method":"$request_method",'
          '"path":"$uri",'
          '"query":"$args",'
          '"status":$status,'
          '"body_bytes_sent":$body_bytes_sent,'
          '"request_time":$request_time,'
          '"user_agent":"$http_user_agent",'
          '"referer":"$http_referer"'
        '}';

      access_log /dev/stdout was_json;
      error_log /dev/stderr warn;

      server {
        listen 8080;

        # Netdata(go.d.plugin) 등 로컬 모니터링 에이전트가 주기적으로 /metrics를
        # 스크래핑하면서 이게 그대로 access log에 찍혀 SIEM에 "WAS 이벤트"로
        # 들어가던 문제 - Juice Shop엔 애초에 이 경로가 없어 프록시할 필요도 없으니
        # access_log를 끄고 바로 204로 끊는다 (실제 공격 트래픽과 무관한 노이즈).
        location = /metrics {
          access_log off;
          return 204;
        }

        location / {
          # 같은 Pod 안의 juice-shop 컨테이너로 그대로 전달 (localhost로 접근 가능)
          proxy_pass http://127.0.0.1:3000;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
      }
    }
